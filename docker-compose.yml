services:
  face-recognition:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: saiv-face-recognition
    ports:
      - "8001:8001"
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
    networks:
      - saiv-network


  otel-collector:
    image: otel/opentelemetry-collector:latest
    container_name: saiv-otel-collector
    command: [ "--config=/etc/otel-collector-config.yaml" ]
    volumes:
      - ./otel-collector-config.yaml:/etc/otel-collector-config.yaml
    networks:
      - saiv-network

networks:
  saiv-network:
    driver: bridge
